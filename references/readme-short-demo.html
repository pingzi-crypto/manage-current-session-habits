<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>README Short Demo</title>
  <style>
    :root {
      --bg: #f4f1e8;
      --panel: rgba(255, 252, 246, 0.94);
      --border: rgba(43, 44, 40, 0.12);
      --text: #20211c;
      --muted: #686d63;
      --user: #1d7f57;
      --assistant: #ece7dc;
      --assistant-border: #d7d1c3;
      --accent: #b65a2a;
      --shadow: 0 18px 48px rgba(32, 33, 28, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(182, 90, 42, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(29, 127, 87, 0.18), transparent 32%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .frame {
      width: 760px;
      height: 620px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px 12px;
      border-bottom: 1px solid rgba(43, 44, 40, 0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.56), rgba(255,255,255,0));
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .title p {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
    }

    .badge {
      font-size: 11px;
      color: #fff;
      background: var(--accent);
      padding: 7px 11px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .chat {
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .chat::-webkit-scrollbar {
      display: none;
    }

    .bubble {
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.45;
      font-size: 14px;
      transform: translateY(16px);
      opacity: 0;
      transition:
        opacity 220ms ease,
        transform 220ms ease;
    }

    .bubble.user {
      align-self: flex-end;
      background: var(--user);
      color: #fff;
      border-bottom-right-radius: 8px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid var(--assistant-border);
      border-bottom-left-radius: 8px;
    }

    .bubble small {
      display: block;
      margin-top: 7px;
      font-size: 11px;
      opacity: 0.8;
    }

    .bubble.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .footer {
      padding: 10px 16px 14px;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .hint {
      font-weight: 600;
      color: var(--accent);
    }

  </style>
</head>
<body>
  <main class="frame">
    <header class="topbar">
      <div class="title">
        <h1>Current Session Habits</h1>
        <p>README short loop for manage-current-session-habits</p>
      </div>
      <div class="badge">8-15s loop</div>
    </header>

    <section class="chat" id="chat"></section>

    <footer class="footer">
      <span>Loop the browser area in ScreenToGif.</span>
      <span class="hint">Tip: start recording just before the first user bubble appears.</span>
    </footer>
  </main>
  <script>
    const chat = document.getElementById("chat");
    const introDelayMs = 500;
    const betweenMessagesMs = 1200;
    const finalPauseMs = 1700;

    const messages = [
      {
        role: "user",
        html: "扫描这次会话里的习惯候选"
      },
      {
        role: "assistant",
        html: "这次会话共发现 1 条习惯候选：<br />1. 「收尾一下」, 意图 <code>close_session</code>, 建议添加，置信度 0.88<small>接下来可以直接说：添加第1条 / 忽略第1条 / 把第1条加到 session_close 场景</small>"
      },
      {
        role: "user",
        html: "添加第1条"
      },
      {
        role: "assistant",
        html: "已添加用户习惯短句「收尾一下」，意图 <code>close_session</code>，场景 <code>session_close</code>，置信度 0.88。"
      },
      {
        role: "user",
        html: "停"
      },
      {
        role: "assistant",
        html: "当前这个方向先停。你可以直接切回更高价值的主任务，或之后再回来继续处理习惯短句。"
      }
    ];

    function sleep(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function createBubble(message) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${message.role}`;
      bubble.innerHTML = message.html;
      return bubble;
    }

    async function playLoop() {
      while (true) {
        chat.replaceChildren();
        chat.scrollTop = 0;
        await sleep(introDelayMs);

        for (const message of messages) {
          const bubble = createBubble(message);
          chat.appendChild(bubble);
          requestAnimationFrame(() => bubble.classList.add("visible"));
          requestAnimationFrame(() => {
            chat.scrollTo({
              top: chat.scrollHeight,
              behavior: "smooth"
            });
          });
          await sleep(betweenMessagesMs);
        }

        await sleep(finalPauseMs);
      }
    }

    playLoop();
  </script>
</body>
</html>
